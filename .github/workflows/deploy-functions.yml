name: Deploy Firebase Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Write service account JSON (from secret)
        env:
          FUNCTIONS_SERVICE_ACCOUNT: ${{ secrets.FUNCTIONS_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FUNCTIONS_SERVICE_ACCOUNT" ]; then echo "Missing FUNCTIONS_SERVICE_ACCOUNT secret" && exit 1; fi
          echo "$FUNCTIONS_SERVICE_ACCOUNT" > functions/serviceAccountKey.json

      - name: Expose credentials to workflow
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/functions/serviceAccountKey.json" >> $GITHUB_ENV

      - name: Deploy functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --token "$FIREBASE_TOKEN"

      - name: Cleanup credentials file
        run: rm -f functions/serviceAccountKey.json
